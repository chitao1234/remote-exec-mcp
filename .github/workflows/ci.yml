name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  rust-fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all --check

  rust-test:
    name: Rust test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: v1-rust-test-nodebug

      - name: Run tests
        run: cargo test --workspace --locked

  rust-test-no-default-features:
    name: Rust no-default-features (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test broker without default features
        run: cargo test -p remote-exec-broker --no-default-features --tests --locked

      - name: Test daemon without default features
        run: cargo test -p remote-exec-daemon --no-default-features --tests --locked

      - name: Test host without default features
        run: cargo test -p remote-exec-host --no-default-features --tests --locked

  rust-clippy:
    name: Rust clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  rust-clippy-no-default-features:
    name: Rust clippy no-default-features (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run broker clippy without default features
        run: cargo clippy -p remote-exec-broker --no-default-features --all-targets --locked -- -D warnings

      - name: Run daemon clippy without default features
        run: cargo clippy -p remote-exec-daemon --no-default-features --all-targets --locked -- -D warnings

      - name: Run host clippy without default features
        run: cargo clippy -p remote-exec-host --no-default-features --all-targets --locked -- -D warnings

  cpp:
    name: C++ daemon (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache C++ build outputs
        uses: actions/cache@v4
        with:
          path: crates/remote-exec-daemon-cpp/build
          key: cpp-${{ runner.os }}-${{ hashFiles('crates/remote-exec-daemon-cpp/**') }}
          restore-keys: |
            cpp-${{ runner.os }}-

      - name: Install Linux C++ dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make g++-mingw-w64-i686

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            make
            mingw-w64-i686-gcc

      - name: Run Linux C++ checks
        if: runner.os == 'Linux'
        run: |
          jobs="$(nproc)"

          make -j"${jobs}" -C crates/remote-exec-daemon-cpp BUILD_DIR=build/ci-posix check-posix &
          posix_pid="$!"

          make -j"${jobs}" -C crates/remote-exec-daemon-cpp BUILD_DIR=build/ci-windows-xp check-windows-xp &
          xp_pid="$!"

          posix_status=0
          xp_status=0
          wait "${posix_pid}" || posix_status="$?"
          wait "${xp_pid}" || xp_status="$?"

          if [ "${posix_status}" -ne 0 ] || [ "${xp_status}" -ne 0 ]; then
            exit 1
          fi

      - name: Run Windows C++ checks
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          jobs="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 1)"
          make -j"${jobs}" -C crates/remote-exec-daemon-cpp check-windows-xp
