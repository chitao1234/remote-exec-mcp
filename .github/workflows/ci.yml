name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  rust-fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all --check

  rust-test:
    name: Rust test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up MSVC for Rust C++ integration tests
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: v1-rust-test-nodebug

      - name: Run tests
        if: runner.os == 'Linux'
        shell: bash
        env:
          REMOTE_EXEC_CPP_DAEMON: ${{ github.workspace }}/crates/remote-exec-daemon-cpp/build/remote-exec-daemon-cpp
        run: |
          set -eu
          cpp_status=0
          rust_status=0

          set +e
          make -k -C crates/remote-exec-daemon-cpp all-posix
          cpp_status=$?

          cargo test --workspace --locked --no-fail-fast
          rust_status=$?
          set -e

          printf 'C++ build status: %s\n' "$cpp_status"
          printf 'Rust test status: %s\n' "$rust_status"

          if [ "$cpp_status" -ne 0 ] || [ "$rust_status" -ne 0 ]; then
            exit 1
          fi

      - name: Run tests
        if: runner.os == 'Windows'
        shell: cmd
        env:
          REMOTE_EXEC_CPP_DAEMON: ${{ github.workspace }}\crates\remote-exec-daemon-cpp\build\remote-exec-daemon-cpp-msvc.exe
        run: |
          @echo off
          setlocal EnableExtensions
          set "cpp_status=0"
          set "rust_status=0"

          nmake /K /f crates\remote-exec-daemon-cpp\NMakefile all-msvc-native
          if errorlevel 1 set "cpp_status=%errorlevel%"

          cargo test --workspace --locked --no-fail-fast
          if errorlevel 1 set "rust_status=%errorlevel%"

          echo C++ build status: %cpp_status%
          echo Rust test status: %rust_status%

          if not "%cpp_status%"=="0" exit /b 1
          if not "%rust_status%"=="0" exit /b 1

  rust-test-no-default-features:
    name: Rust no-default-features (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run no-default-features tests
        shell: bash
        run: |
          set -eu
          broker_status=0
          daemon_status=0
          host_status=0

          set +e
          cargo test -p remote-exec-broker --no-default-features --tests --locked --no-fail-fast
          broker_status=$?

          cargo test -p remote-exec-daemon --no-default-features --tests --locked --no-fail-fast
          daemon_status=$?

          cargo test -p remote-exec-host --no-default-features --tests --locked --no-fail-fast
          host_status=$?
          set -e

          printf 'broker status: %s\n' "$broker_status"
          printf 'daemon status: %s\n' "$daemon_status"
          printf 'host status: %s\n' "$host_status"

          if [ "$broker_status" -ne 0 ] || [ "$daemon_status" -ne 0 ] || [ "$host_status" -ne 0 ]; then
            exit 1
          fi

  rust-clippy:
    name: Rust clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  rust-clippy-no-default-features:
    name: Rust clippy no-default-features (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run broker clippy without default features
        run: cargo clippy -p remote-exec-broker --no-default-features --all-targets --locked -- -D warnings

      - name: Run daemon clippy without default features
        run: cargo clippy -p remote-exec-daemon --no-default-features --all-targets --locked -- -D warnings

      - name: Run host clippy without default features
        run: cargo clippy -p remote-exec-host --no-default-features --all-targets --locked -- -D warnings

  cpp:
    name: C++ daemon (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache C++ build outputs
        uses: actions/cache@v4
        with:
          path: crates/remote-exec-daemon-cpp/build
          key: cpp-${{ runner.os }}-${{ hashFiles('crates/remote-exec-daemon-cpp/**') }}
          restore-keys: |
            cpp-${{ runner.os }}-

      - name: Install Linux C++ dependencies
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y g++ make g++-mingw-w64-i686 wine wine32:i386

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Run Linux C++ checks
        if: runner.os == 'Linux'
        run: |
          jobs="$(nproc)"

          make -k -j"${jobs}" -C crates/remote-exec-daemon-cpp BUILD_DIR=build/ci-posix check-posix &
          posix_pid="$!"

          make -k -j"${jobs}" -C crates/remote-exec-daemon-cpp BUILD_DIR=build/ci-windows-xp check-windows-xp &
          xp_pid="$!"

          posix_status=0
          xp_status=0
          wait "${posix_pid}" || posix_status="$?"
          wait "${xp_pid}" || xp_status="$?"

          if [ "${posix_status}" -ne 0 ] || [ "${xp_status}" -ne 0 ]; then
            exit 1
          fi

      - name: Run Windows C++ checks
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          nmake /K /f crates\remote-exec-daemon-cpp\NMakefile check-msvc-native
