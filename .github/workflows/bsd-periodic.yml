name: BSD Periodic CI

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_BUILD_OVERRIDE_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  RUST_BACKTRACE: "1"

jobs:
  bsd-test:
    name: BSD test (${{ matrix.os.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BSD_NAME: ${{ matrix.os.name }}
      BSD_RUST_SETUP: ${{ matrix.os.rust_setup }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - label: FreeBSD
            name: freebsd
            architecture: x86-64
            version: "15.0"
            rust_setup: rustup
          - label: OpenBSD
            name: openbsd
            architecture: x86-64
            version: "7.8"
            rust_setup: package
          - label: NetBSD
            name: netbsd
            architecture: x86-64
            version: "10.1"
            rust_setup: rustup
          - label: DragonFly BSD
            name: dragonflybsd
            architecture: x86-64
            version: "6.4.2"
            rust_setup: package

    defaults:
      run:
        shell: cpa.sh {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download rustup-init for ${{ matrix.os.label }}
        if: matrix.os.rust_setup == 'rustup'
        shell: bash
        run: |
          set -euo pipefail
          case '${{ matrix.os.name }}' in
            freebsd)
              rustup_target='x86_64-unknown-freebsd'
              ;;
            netbsd)
              rustup_target='x86_64-unknown-netbsd'
              ;;
            *)
              echo "unexpected rustup BSD target: ${{ matrix.os.name }}" >&2
              exit 1
              ;;
          esac
          mkdir -p .github/bin
          curl -fsSL \
            "https://static.rust-lang.org/rustup/dist/${rustup_target}/rustup-init" \
            -o .github/bin/rustup-init
          chmod +x .github/bin/rustup-init

      - name: Start ${{ matrix.os.label }} VM
        uses: cross-platform-actions/action@master
        with:
          environment_variables: BSD_NAME BSD_RUST_SETUP CARGO_TERM_COLOR CARGO_INCREMENTAL CARGO_PROFILE_BUILD_OVERRIDE_DEBUG CARGO_PROFILE_TEST_DEBUG RUST_BACKTRACE
          operating_system: ${{ matrix.os.name }}
          architecture: ${{ matrix.os.architecture }}
          version: ${{ matrix.os.version }}
          memory: 6G
          cpu_count: 4

      - name: Record guest details
        run: |
          set -eu
          uname -a
          printf 'rust setup mode: %s\n' "$BSD_RUST_SETUP"
          df -h .
          df -h /var/tmp || true

      - name: Run C++ and Rust tests on ${{ matrix.os.label }}
        run: |
          set -eu

          run_as_root() {
            if command -v sudo >/dev/null 2>&1; then
              sudo "$@"
            elif command -v doas >/dev/null 2>&1; then
              doas "$@"
            elif [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              echo "no supported privilege escalation command found" >&2
              return 1
            fi
          }

          ensure_make_tool() {
            case "$BSD_NAME" in
              openbsd)
                if ! command -v gmake >/dev/null 2>&1; then
                  run_as_root pkg_add gmake
                fi
                PATH="/usr/local/bin:$PATH"
                export PATH
                MAKE_CMD=gmake
                ;;
              *)
                MAKE_CMD=make
                ;;
            esac
            export MAKE_CMD
            command -v "$MAKE_CMD" >/dev/null 2>&1
          }

          setup_rust() {
            case "$BSD_RUST_SETUP" in
              rustup)
                ./.github/bin/rustup-init -y --profile minimal --default-toolchain 1.85.0
                . "$CARGO_HOME/env"
                ;;
              package)
                case "$BSD_NAME" in
                  openbsd)
                    run_as_root pkg_add rust
                    ;;
                  dragonflybsd)
                    run_as_root pkg install -y rust
                    ;;
                  *)
                    echo "unexpected packaged-rust BSD target: $BSD_NAME" >&2
                    return 1
                    ;;
                esac
                ;;
              *)
                echo "unexpected rust setup mode: $BSD_RUST_SETUP" >&2
                return 1
                ;;
            esac
          }

          work_root=/var/tmp/remote-exec-bsd-ci
          cargo_home="$work_root/cargo-home"
          rustup_home="$work_root/rustup-home"
          cargo_target_dir="$work_root/target"
          cpp_build_dir="$work_root/cpp-build"
          tmp_dir="$work_root/tmp"

          mkdir -p "$cargo_home" "$rustup_home" "$cargo_target_dir" "$cpp_build_dir" "$tmp_dir"
          export CARGO_HOME="$cargo_home"
          export RUSTUP_HOME="$rustup_home"
          export CARGO_TARGET_DIR="$cargo_target_dir"
          export TMPDIR="$tmp_dir"

          ensure_make_tool
          setup_rust

          c++ --version
          cargo --version
          rustc --version
          printf 'make command: %s\n' "$MAKE_CMD"
          "$MAKE_CMD" -v >/dev/null 2>&1 || true
          df -h "$work_root" || true

          cpp_daemon="$cpp_build_dir/remote-exec-daemon-cpp"
          cpp_status=0
          rust_status=0

          set +e
          "$MAKE_CMD" -k -C crates/remote-exec-daemon-cpp BUILD_DIR="$cpp_build_dir" HOST_CXX=c++ all-posix
          cpp_status=$?
          if [ "$cpp_status" -eq 0 ]; then
            "$MAKE_CMD" -k -C crates/remote-exec-daemon-cpp BUILD_DIR="$cpp_build_dir" HOST_CXX=c++ check-posix
            cpp_status=$?
          fi

          REMOTE_EXEC_CPP_DAEMON="$cpp_daemon" \
            cargo test --workspace --all-features --locked --no-fail-fast
          rust_status=$?
          set -e

          printf 'C++ status: %s\n' "$cpp_status"
          printf 'Rust status: %s\n' "$rust_status"

          if [ "$cpp_status" -ne 0 ] || [ "$rust_status" -ne 0 ]; then
            exit 1
          fi
