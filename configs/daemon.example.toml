target = "builder-a"
listen = "0.0.0.0:9443"
# Must already exist when the daemon starts.
default_workdir = "/srv/work"
allow_login_shell = true
# Live exec sessions and daemon-side forwarded sockets are in-memory only and
# are closed during daemon shutdown or restart.

# Optional. Maximum live exec sessions retained by the Rust daemon. When this
# limit is full, older sessions are pruned, preferring completed sessions.
#max_open_sessions = 64

# Optional. Defaults to "tls" when the daemon is built with the default `tls`
# Cargo feature. Set to "http" to serve the Rust daemon over plain HTTP
# without TLS or client-certificate authentication.
#transport = "http"

# Optional. Omit to auto-detect PTY support, or set to "none" to disable TTY.
# On Windows, "conpty" and "winpty" force a specific backend and fail startup if unavailable.
# "winpty" also requires the daemon to be built with the default `winpty` Cargo feature.
#pty = "none"

# Optional. When false, the daemon rejects `transfer_files` requests that set
# `compression = "zstd"` and only accepts uncompressed tar payloads.
#enable_transfer_compression = true

# Optional transfer import safety limits.
#[transfer_limits]
#max_archive_bytes = 536870912
#max_entry_bytes = 536870912

# Optional. If set, daemon startup fails unless this shell is usable.
# On Windows, omitted default shell now prefers Git Bash when Git for Windows is installed.
# Set this to "powershell.exe" or "cmd.exe" to keep the older behavior.
#default_shell = "/bin/sh"

# Optional Windows-only synthetic POSIX root. When set, single-slash POSIX paths
# such as "/usr/bin/bash" or "/tmp/work" resolve under this root for `workdir`,
# image, patch, and transfer paths, and for configured shell paths.
#windows_posix_root = "C:\\msys64"

# Optional experimental flag. When true, `apply_patch` tries to autodetect the
# existing target file's text encoding instead of requiring UTF-8.
#experimental_apply_patch_target_encoding_autodetect = true

# Optional HTTP bearer auth. Supported on both `http` and `tls` transports.
# This authenticates broker requests but does not add encryption or integrity
# protection when you use plain HTTP.
#[http_auth]
#bearer_token = "replace-me"

# Optional. Per-operation yield-time policy overrides. `min_ms` silently raises
# smaller caller-provided values, `default_ms` applies when the caller omits
# `yield_time_ms`, and `max_ms` caps larger values.
#[yield_time.exec_command]
#default_ms = 10000
#max_ms = 30000
#min_ms = 250
#
#[yield_time.write_stdin_poll]
#default_ms = 5000
#max_ms = 300000
#min_ms = 5000
#
#[yield_time.write_stdin_input]
#default_ms = 250
#max_ms = 30000
#min_ms = 250

# Optional. Maximum time in milliseconds the daemon allows a single RPC request
# to run before returning HTTP 408. Does not apply to port tunnel connections
# (which are long-lived). Defaults to 300000 (5 minutes).
#request_timeout_ms = 300000

# Optional daemon-side forwarding limits.
# Rust daemons enforce all values below daemon-wide. C++ daemon builds expose
# matching flat INI keys in crates/remote-exec-daemon-cpp/config/daemon-cpp.example.ini.
#[port_forward_limits]
#max_tunnel_connections = 128
#max_retained_sessions = 64
#max_retained_listeners = 64
#max_udp_binds = 64
#max_active_tcp_streams = 1024
#max_tunnel_queued_bytes = 8388608
#connect_timeout_ms = 10000

# Optional static path sandbox. Missing `allow` or `allow = []` means "allow all",
# then `deny` can carve out exclusions.
# `exec_cwd` applies only to the resolved starting cwd for `exec_command`.
# `view_image`, `apply_patch`, and `transfer_files` use the resolved read/write path rules.
#[sandbox.exec_cwd]
#allow = ["/srv/work"]
#deny = ["/srv/work/private"]
#
#[sandbox.read]
#allow = ["/srv/work", "/srv/assets"]
#deny = ["/srv/work/.git", "/srv/assets/secrets"]
#
#[sandbox.write]
#allow = ["/srv/work"]
#deny = ["/srv/work/.git", "/srv/work/readonly"]

# Required when `transport = "tls"` or when `transport` is omitted on builds
# that keep the default `tls` Cargo feature enabled.
[tls]
cert_pem = "/etc/remote-exec/daemon.pem"
key_pem = "/etc/remote-exec/daemon.key"
ca_pem = "/etc/remote-exec/ca.pem"
# Optional exact broker leaf certificate pin. The PEM file may contain one or
# more acceptable broker leaf certificates to ease rotation.
#pinned_client_cert_pem = "/etc/remote-exec/pins/broker.pem"
