target = "builder-a"
listen = "0.0.0.0:9443"
default_workdir = "/srv/work"
# Optional. Defaults to "tls". Set to "http" to serve the Rust daemon over
# plain HTTP without TLS or client-certificate authentication.
# transport = "http"
enable_transfer_compression = true
allow_login_shell = true
# Optional. Omit to auto-detect PTY support, or set to "none" to disable TTY.
# On Windows, "conpty" and "winpty" force a specific backend and fail startup if unavailable.
# pty = "none"
# Optional. When false, the daemon rejects `transfer_files` requests that set
# `compression = "zstd"` and only accepts uncompressed tar payloads.
# enable_transfer_compression = false
# Optional. If set, daemon startup fails unless this shell is usable.
# On Windows, omitted default shell now prefers Git Bash when Git for Windows is installed.
# Set this to "powershell.exe" or "cmd.exe" to keep the older behavior.
# default_shell = "/bin/sh"
# Optional experimental flag. When true, `apply_patch` tries to autodetect the
# existing target file's text encoding instead of requiring UTF-8.
# experimental_apply_patch_target_encoding_autodetect = true
#
# Optional static path sandbox. Missing `allow` or `allow = []` means "allow all",
# then `deny` can carve out exclusions.
# `exec_cwd` applies only to the resolved starting cwd for `exec_command`.
# `view_image`, `apply_patch`, and `transfer_files` use the resolved read/write path rules.
#
#[sandbox.exec_cwd]
#allow = ["/srv/work"]
#deny = ["/srv/work/private"]
#
#[sandbox.read]
#allow = ["/srv/work", "/srv/assets"]
#deny = ["/srv/work/.git", "/srv/assets/secrets"]
#
#[sandbox.write]
#allow = ["/srv/work"]
#deny = ["/srv/work/.git", "/srv/work/readonly"]

# Required when `transport = "tls"` or when `transport` is omitted.
[tls]
cert_pem = "/etc/remote-exec/daemon.pem"
key_pem = "/etc/remote-exec/daemon.key"
ca_pem = "/etc/remote-exec/ca.pem"
# Optional exact broker leaf certificate pin. The PEM file may contain one or
# more acceptable broker leaf certificates to ease rotation.
# pinned_client_cert_pem = "/etc/remote-exec/pins/broker.pem"
